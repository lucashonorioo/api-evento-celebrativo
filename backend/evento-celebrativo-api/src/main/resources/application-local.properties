spring.datasource.url=${LOCAL_DATASOURCE_URL:jdbc:h2:mem:localdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${LOCAL_DATASOURCE_USERNAME:sa}
spring.datasource.password=${LOCAL_DATASOURCE_PASSWORD:}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/local
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.jpa.properties.hibernate.format_sql=true

app.person-ministry.read-source.reader=${PERSON_MINISTRY_READ_SOURCE_READER:PARALLEL}
app.person-ministry.read-source.commentator=${PERSON_MINISTRY_READ_SOURCE_COMMENTATOR:PARALLEL}
app.person-ministry.read-source.priest=${PERSON_MINISTRY_READ_SOURCE_PRIEST:PARALLEL}
app.person-ministry.read-source.minister-of-the-word=${PERSON_MINISTRY_READ_SOURCE_MINISTER_OF_THE_WORD:PARALLEL}
app.person-ministry.read-source.eucharistic-minister=${PERSON_MINISTRY_READ_SOURCE_EUCHARISTIC_MINISTER:PARALLEL}
app.event-assignment.read-source.event-scale-detail=${EVENT_ASSIGNMENT_READ_SOURCE_EVENT_SCALE_DETAIL:PARALLEL}
app.event-assignment.shadow-read.event-detail-enabled=${EVENT_ASSIGNMENT_SHADOW_READ_EVENT_DETAIL_ENABLED:true}
app.event-assignment.shadow-read.event-scale-detail-enabled=${EVENT_ASSIGNMENT_SHADOW_READ_EVENT_SCALE_DETAIL_ENABLED:true}
app.event-assignment.shadow-read.monthly-schedule-enabled=${EVENT_ASSIGNMENT_SHADOW_READ_MONTHLY_SCHEDULE_ENABLED:true}
app.event-assignment.shadow-read.eucharist-scale-enabled=${EVENT_ASSIGNMENT_SHADOW_READ_EUCHARIST_SCALE_ENABLED:true}

logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
logging.level.com.eventoscelebrativos=DEBUG
