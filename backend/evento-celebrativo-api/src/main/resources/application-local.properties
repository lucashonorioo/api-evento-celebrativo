spring.datasource.url=${LOCAL_DATASOURCE_URL:jdbc:h2:mem:localdb}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${LOCAL_DATASOURCE_USERNAME:sa}
spring.datasource.password=${LOCAL_DATASOURCE_PASSWORD:}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create
spring.sql.init.mode=always
spring.flyway.enabled=false
spring.jpa.properties.hibernate.hbm2ddl.import_files=db/seed/import-local.sql
spring.jpa.properties.hibernate.format_sql=true

logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
logging.level.com.eventoscelebrativos=DEBUG
