spring.datasource.url=jdbc:h2:mem:testdb_${random.uuid};MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.test.database.replace=NONE
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/test
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.jpa.properties.hibernate.format_sql=true

app.event-assignment.read-source.event-scale-detail=${EVENT_ASSIGNMENT_READ_SOURCE_EVENT_SCALE_DETAIL:PARALLEL}
app.event-assignment.read-source.eucharist-scale=${EVENT_ASSIGNMENT_READ_SOURCE_EUCHARIST_SCALE:PARALLEL}
app.event-assignment.read-source.monthly-schedule=${EVENT_ASSIGNMENT_READ_SOURCE_MONTHLY_SCHEDULE:PARALLEL}

logging.level.root=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.test=WARN
logging.level.org.springframework.orm.jpa=WARN
logging.level.org.springframework.transaction=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.com.eventoscelebrativos=TRACE
