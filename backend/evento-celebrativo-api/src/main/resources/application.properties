spring.application.name=API de Eventos Celebrativos

spring.profiles.active=${APP_PROFILE:local}
spring.jpa.open-in-view=false

security.client-id=${CLIENT_ID:myclientid}
security.client-secret=${CLIENT_SECRET:myclientsecret}
security.jwt.duration=${JWT_DURATION:86400}
security.oauth-token-url=${OAUTH_TOKEN_URL:http://localhost:8080/oauth2/token}
cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}
app.person-ministry.read-source.reader=${PERSON_MINISTRY_READ_SOURCE_READER:LEGACY}
app.person-ministry.read-source.commentator=${PERSON_MINISTRY_READ_SOURCE_COMMENTATOR:LEGACY}
app.person-ministry.read-source.priest=${PERSON_MINISTRY_READ_SOURCE_PRIEST:LEGACY}
app.person-ministry.read-source.minister-of-the-word=${PERSON_MINISTRY_READ_SOURCE_MINISTER_OF_THE_WORD:LEGACY}
app.person-ministry.read-source.eucharistic-minister=${PERSON_MINISTRY_READ_SOURCE_EUCHARISTIC_MINISTER:LEGACY}
app.person-ministry.shadow-read.reader-enabled=${PERSON_MINISTRY_SHADOW_READ_READER_ENABLED:false}
app.person-ministry.shadow-read.commentator-enabled=${PERSON_MINISTRY_SHADOW_READ_COMMENTATOR_ENABLED:false}
app.person-ministry.shadow-read.priest-enabled=${PERSON_MINISTRY_SHADOW_READ_PRIEST_ENABLED:false}
app.person-ministry.shadow-read.minister-of-the-word-enabled=${PERSON_MINISTRY_SHADOW_READ_MINISTER_OF_THE_WORD_ENABLED:false}
app.person-ministry.shadow-read.eucharistic-minister-enabled=${PERSON_MINISTRY_SHADOW_READ_EUCHARISTIC_MINISTER_ENABLED:false}
app.event-assignment.read-source.event-scale-detail=${EVENT_ASSIGNMENT_READ_SOURCE_EVENT_SCALE_DETAIL:LEGACY}
app.event-assignment.read-source.eucharist-scale=${EVENT_ASSIGNMENT_READ_SOURCE_EUCHARIST_SCALE:LEGACY}
app.event-assignment.shadow-read.event-detail-enabled=${EVENT_ASSIGNMENT_SHADOW_READ_EVENT_DETAIL_ENABLED:false}
app.event-assignment.shadow-read.event-scale-detail-enabled=${EVENT_ASSIGNMENT_SHADOW_READ_EVENT_SCALE_DETAIL_ENABLED:false}
app.event-assignment.shadow-read.monthly-schedule-enabled=${EVENT_ASSIGNMENT_SHADOW_READ_MONTHLY_SCHEDULE_ENABLED:false}
app.event-assignment.shadow-read.eucharist-scale-enabled=${EVENT_ASSIGNMENT_SHADOW_READ_EUCHARIST_SCALE_ENABLED:false}
