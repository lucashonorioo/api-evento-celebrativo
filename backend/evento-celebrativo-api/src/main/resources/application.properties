spring.application.name=API de Eventos Celebrativos

spring.profiles.active=${APP_PROFILE:local}
spring.jpa.open-in-view=false

security.client-id=${CLIENT_ID:myclientid}
security.client-secret=${CLIENT_SECRET:myclientsecret}
security.jwt.duration=${JWT_DURATION:86400}
security.oauth-token-url=${OAUTH_TOKEN_URL:http://localhost:8080/oauth2/token}
cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}
app.person-ministry.shadow-read.reader-enabled=${PERSON_MINISTRY_SHADOW_READ_READER_ENABLED:false}
