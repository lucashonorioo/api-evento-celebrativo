<div class="app-shell">
  <header class="app-header">
    <a class="app-header__brand" routerLink="/app/inicio">Evento Celebrativo</a>

    <div class="app-header__account">
      <span class="app-header__username">{{ username }}</span>
      <button class="app-header__logout" type="button" (click)="onLogout()">Sair</button>
    </div>
  </header>

  <nav class="app-navigation" aria-label="Navegacao principal">
    <a
      class="app-navigation__link"
      routerLink="/app/inicio"
      routerLinkActive="app-navigation__link--active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Inicio
    </a>
    <a
      class="app-navigation__link"
      routerLink="/app/eventos"
      routerLinkActive="app-navigation__link--active"
    >
      Eventos
    </a>
    <a
      class="app-navigation__link"
      routerLink="/app/locais"
      routerLinkActive="app-navigation__link--active"
    >
      Locais
    </a>
    <a
      class="app-navigation__link"
      routerLink="/app/leitores"
      routerLinkActive="app-navigation__link--active"
    >
      Leitores
    </a>
    <a
      class="app-navigation__link"
      routerLink="/app/comentaristas"
      routerLinkActive="app-navigation__link--active"
    >
      Comentaristas
    </a>
    <a
      class="app-navigation__link"
      routerLink="/app/padres"
      routerLinkActive="app-navigation__link--active"
    >
      Padres
    </a>
    <a
      class="app-navigation__link"
      routerLink="/app/ministros-palavra"
      routerLinkActive="app-navigation__link--active"
    >
      Ministros da Palavra
    </a>
    <a
      class="app-navigation__link"
      routerLink="/app/ministros-eucaristia"
      routerLinkActive="app-navigation__link--active"
    >
      Ministros da Eucaristia
    </a>
    <a
      class="app-navigation__link"
      routerLink="/app/escala/eucaristia"
      routerLinkActive="app-navigation__link--active"
    >
      Escala de Eucaristia
    </a>
  </nav>

  <main class="app-content">
    <router-outlet />
  </main>
</div>
